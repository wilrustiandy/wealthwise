{% load static %}

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>WealthWise</title>

        <!-- Styles -->
        <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
        <link rel="stylesheet" href="{% static 'assets/vendors/mdi/css/materialdesignicons.min.css' %}">
        <link rel="stylesheet" href="{% static 'assets/vendors/font-awesome/css/font-awesome.min.css' %}">

        <link rel="shortcut icon" href="{% static 'assets/images/favicon.png' %}">

        <!-- Core JS Files -->
        <script src="{% static 'assets/vendors/js/vendor.bundle.base.js' %}"></script>
        <script src="{% static 'assets/js/misc.js' %}"></script>
        <script src="{% static 'assets/js/jquery.min.js' %}"></script>
    </head>
    <body>
        <!-- Message Modal -->
        <div class="modal fade" id="messageModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-top">
              <div class="modal-content">
                <div class="modal-body" id="messageText">
                    {% for message in messages %}
                        {{ message }}
                    {% endfor %}
                  <!-- Message content will go here -->
                </div>
              </div>
            </div>
        </div>

        <!-- Body -->
        <div class="container-scroller">
            <!-- Sidebar -->
            {% include "core/sidebar.html" %}
            <div class="container-fluid page-body-wrapper">
                <!-- Header -->
                {% include "core/header.html" %}

                <!-- Content -->
                <div class="main-panel">
                    <div class="content-wrapper">
                        {% block content %}
                        {% endblock %}
                    </div>

                    <!-- Footer -->
                    {% include "core/footer.html" %}
                </div>
            </div>
        </div>

        <!-- Confirmation Modal -->
        <div class="modal fade" id="confirmationModal" tabindex="-1" aria-labelledby="confirmationModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark">
                <div class="modal-header border-0">
					<h5 class="modal-title" id="confirmationModalLabel">
						<i class="fa fa-question-circle me-2"></i> Confirm Action
					</h5>
					<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
                <div class="modal-body">
					<p class="fs-5" id="confirmationText"></p>
				</div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
						<i class="fa fa-times me-2"></i> Cancel
					</button>
				   <a class="btn btn-danger" id="confirmActionButton" href="#">
					  <i class="fa fa-check me-2"></i> Confirm
				   </a>
                </div>
            </div>
            </div>
        </div> 
    </body>

    <!-- Message Modal Script -->
    <script>
        $(document).ready(function() {
            {% if messages %}
                {% for message in messages %}
                    let messageTags = "{{ message.tags }}";
                    const modal = $("#messageModal");
    
                    $("#messageText").text("{{ message|escapejs }}");
    
                    if (messageTags === "success") {
                        $('.modal-content').addClass("bg-success text-white")
                    } else if (messageTags === "error") {
                        $('.modal-content').addClass("bg-danger text-white")
                    }
    
                    modal.removeClass("d-none")
    
                    // Show animation
                    var messageModal = new bootstrap.Modal(modal[0]);
                    messageModal.show();
                    
                    // Auto hide after 2 seconds with fade
                    setTimeout(() => {
                        modal.fadeOut(600, function() {
                            messageModal.hide();
                            modal.show(); // reset for next message
                        });
                    }, 1000);
                {% endfor %}
            {% endif %}

            $('#confirmationModal').on('show.bs.modal', function (event) {
                // Button that triggered the modal
                var button = $(event.relatedTarget);
        
                // Extract the URL and name from data attributes
                var url = button.data('url');
                var action = button.data('action');
                var name = button.data('name');
                var confirmationText = `Are you sure you want to ${action} <strong>${name}</strong>?`;
        
                // Update the href attribute of the confirm button in the modal
                $('#confirmActionButton').attr('href', url);
        
                // Optionally update the confirmation text in the modal
                $('#confirmationText').html(confirmationText);
            });
        });
    </script>
</html>
