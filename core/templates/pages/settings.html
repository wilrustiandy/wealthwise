{% extends "core/base.html" %}
{% load static %}

{% block title %}
    Settings
{% endblock %}

{% block content %}
<div class="container-fluid page-body-wrapper full-page-wrapper">
    <div class="content-wrapper d-flex align-items-center justify-content-center">
        <div class="row w-100">
            <div class="col-lg-4 mx-auto">

                <!-- Change Full Name -->
                <div class="card bg-dark text-white p-4 mb-4">
                    <div class="card-body">
                        <h3 class="text-center mb-4">Change Full Name</h3>
                        <form method="POST" action="{% url 'edit-fullname' %}">
                            {% csrf_token %}
                            <div class="form-group mb-3">
                                <label for="fullname" class="form-label">Full Name</label>
                                <input type="text" name="fullname" id="fullname" class="form-control"
                                       value="{{ user.get_full_name }}" required>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-info btn-block">
                                    <i class="mdi mdi-account-edit me-2"></i> Update Name
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Change Password -->
                <div class="card bg-dark text-white p-4">
                    <div class="card-body">
                        <h3 class="text-center mb-4">Change Password</h3>
                        <form method="POST" action="{% url 'edit-password' %}">
                            {% csrf_token %}

                            <div class="form-group mb-3">
                                <label for="old_password" class="form-label">Old Password</label>
                                <input type="password" name="old_password" id="old_password" class="form-control"
                                       placeholder="Enter old password" required>
                            </div>

                            <div class="form-group mb-3">
                                <label for="new_password" class="form-label">New Password</label>
                                <input type="password" name="new_password" id="new_password" class="form-control"
                                       placeholder="Enter new password" required>
                            </div>

                            <div class="form-group mb-3">
                                <label for="confirm_password" class="form-label">Confirm Password</label>
                                <input type="password" name="confirm_password" id="confirm_password" class="form-control"
                                       placeholder="Confirm new password" required>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-success btn-block">
                                    <i class="mdi mdi-lock-reset me-2"></i> Change Password
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
